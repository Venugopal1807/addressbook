# Alembic configuration for Addressbook schema management.
# See: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts
script_location = .

# Database URL — points to the same SQLite file used by the Qt app.
# Override via ADDRESSBOOK_DB_URL environment variable if needed.
sqlalchemy.url = sqlite:///%(here)s/../build/addressbook.db

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
